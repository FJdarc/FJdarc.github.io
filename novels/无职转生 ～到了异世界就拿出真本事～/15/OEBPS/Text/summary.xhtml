  <div>
    <h4>简介</h4>

    <p>鲁迪乌斯遇见了从未来进行时光旅行来到现代的年迈自己。</p>

    <p>然而，未来的自己走的却是一条丧失所有重要之人的路线。</p>

    <p>鲁迪乌斯为了回避这个未来，决定接受人神的提案，打倒奥尔斯帝德。</p>

    <p>在准备期间，鲁迪乌斯相信老人留下的建议，决定写信寄给五年前不告而别的艾莉丝，向她提出某个提案。</p>

    <p>「如果我能活着回来，我们再继续谈这件事吧。」</p>

    <p>故事面临巨大转变，鲁迪乌斯和艾莉丝会被红线牵引，让彼此的命运再次交会吗？</p>

    <p>「人生重来型」转生奇幻小说，第十五集在此开幕！</p>
