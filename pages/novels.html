---
layout: page
title: 小说
---

<style>
  #novel-display {
    display: none;
    white-space: pre-line;
  }
</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}

    <div id="novel-display"></div>
</div>

<script>
links.forEach(link => {
  link.addEventListener('click', async (event) => {
    event.preventDefault();
    
    // 显示加载状态
    novelDisplay.style.display = 'block';
    novelDisplay.textContent = '正在加载...';
    
    // 隐藏列表
    document.querySelectorAll('.list-post').forEach(post => 
      post.style.display = 'none'
    );

    try {
      // 添加时间戳避免缓存问题
      const url = new URL(link.href);
      url.searchParams.set('t', Date.now());
      
      const response = await fetch(url);
      if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
      if (!response.headers.get('content-type')?.includes('text/plain')) {
        throw new Error('无效的内容类型');
      }
      
      const text = await response.text();
      novelDisplay.textContent = text;
      
      // 更新浏览器历史记录
      history.pushState({ showContent: true }, '', link.href);
      
    } catch (error) {
      novelDisplay.innerHTML = `
        <span style="color: red">加载失败：${error.message}</span><br>
        <button onclick="location.reload()">返回列表</button>
      `;
    }
  });
});
</script>
