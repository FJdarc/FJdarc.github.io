<h1 class="color1">简介</h1>
<p>在遭受「兽」的侵蚀而濒临死亡的莱耶尔市，郊外的森林里诞生了两名新的妖精，她们被取名为苹果与棉花糖。</p>
<p>「费多尔～！」「费多尔～」「真是的，为什么这么爱黏我啊？」</p>
<p>费奥多尔四等武官发着牢骚，而菈琪旭则回以恶作剧般的笑容。</p>
<p>在与她们一同度过的日子中，费奥多尔下定决心要告知自己的想法，然而他却发现了装有〈<ruby>第十一兽<rt>Croyance</rt></ruby>〉的「小瓶子」……</p>
<p>新系列第二集登场！</p>
