    <h4>简介</h4>

    <p>艾莉丝消失后过了几个月。</p>

    <p>鲁迪乌斯尽管内心感到空虚，还是为了寻找母亲塞妮丝，来到巴榭兰特公国的第二都市罗森堡。</p>

    <p>胸中抱着强烈孤独感的鲁迪乌斯原本打算单独行动，却受到路上认识的队伍半强迫式的邀约，和他们一起处理委托……</p>

    <p>「我不能自暴自弃，该去做那些必须做的事情」。</p>

    <p>历经千辛万苦后，对于和艾莉丝分离一事应该已经做出决断。</p>

    <p>然而，这件事却在意外的方面侵蚀鲁迪乌斯……！？</p>

    <p>「人生重来型」转生奇幻小说，通篇全新执笔的第七集在此登场！</p>
