  <title>彩頁</title>

<body>
  <div class="illus1" style="margin: 3%;">
    <p><br /></p>

    <p class="zin lh ico3" style="margin: 0;">將來，我一定會成為像珂朵莉學姊那樣的妖精兵。<br />
    ……我說的將來，就是將來啊。<br />
    比明天稍遠一點的未來。</p>

    <p class="illus2 ico3-1"><b>緹亞忒</b></p>

    <p><br /></p>

    <p class="zin lh ico4" style="margin: 0;">即使只有一條路，也沒有什麼好困擾。<br />
    重要的是該怎麼走那條路。<br />
    對吧？</p>

    <p class="illus2 ico4-1"><b>潘麗寶</b></p>

    <p><br /></p>

    <p class="zin lh ico5" style="margin: 0;">我討厭……<br />
    可怕的事物。<br />
    最可怕的事，<br />
    就是變得什麼也不怕。</p>

    <p class="illus2 ico5-1"><b>菈琪旭</b></p>

    <p><br /></p>

    <p class="zin lh ico6" style="margin: 0;">別擔心！<br />
    有可蓉在，<br />
    所以沒問題的！</p>

    <p class="illus2 ico6-1"><b>可蓉</b></p>

    <p><br /></p>

    <div class="illus2 em08 ico2">
      <p class="zin lh" style="margin: 0;">花朵綻放以後，只有等待枯萎凋零的命運。</p>

      <p class="zin lh" style="margin: 0;">即使如此，小小的花苞們仍夢想花開的那一天，隨風搖曳著。</p>
    </div>
  </div>
</body>
</html>
