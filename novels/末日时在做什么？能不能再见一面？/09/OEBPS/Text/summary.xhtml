    <h4>简介</h4>

    <p>击败三十九号悬浮岛的〈最后之兽〉，替濒临灭亡的悬浮大陆群争取了一段时间，在那之后过了五年。「要求奥尔兰多商会第四仓库提供『镞』。」如果想要守护世界，就必须驱逐将众神囚禁在二号悬浮岛的〈最后之兽〉──在最终决战前，妖精兵们度过了一段短暂的日常生活。「阿尔蜜塔，你现在还想变得跟缇亚忒学姐一样吗？」过去憧憬的景色就近在眼前，让年幼的妖精兵陷入纠结──必须下定决心的时刻即将到来。</p>
