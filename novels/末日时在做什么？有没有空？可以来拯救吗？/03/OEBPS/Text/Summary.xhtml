  <div>
    <h4>简介</h4>

    <p>想听见你说「你回来了」；想好好地说出「我回来了」；想吃到奶油蛋糕。</p>

    <p>那些愿望全都实现了。回到该回的地方；见到想见的人。因此，约定皆已达成。</p>

    <p>紧追而至的末日，从身后悄悄地将手搭上少女的肩膀。</p>

    <p>「对不起。我已经绝对无法得到幸福了。因为，我发现了。其实我早就已经──」</p>

    <p>青年教官与妖精少女共度的，既短暂又灿烂的日子。第三幕。</p>
  </div>
