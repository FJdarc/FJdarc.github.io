---
layout: page
title: 小说
---

<style>
  #url-display {
    display: none;
  }
</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}

    <div id="url-display"></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const links = document.querySelectorAll('.list-post a.hover-underline');
    const urlDisplay = document.getElementById('url-display');
  
    links.forEach(link => {
      link.addEventListener('click', function(event) {
        event.preventDefault();
        
        // 获取被点击链接的href
        const targetUrl = this.href;
        
        // 将URL显示在div中（纯文本形式）
        urlDisplay.textContent = targetUrl; 
        // 如果需要显示可点击链接则用：
        // urlDisplay.innerHTML = `<a href="${targetUrl}">${targetUrl}</a>`;
  
        // 隐藏所有小说列表
        const allListPosts = document.querySelectorAll('.list-post');
        allListPosts.forEach(post => post.style.display = 'none');
        
        // 显示URL容器
        urlDisplay.style.display = 'block';
      });
    });
  });
</script>
