    <h4>简介</h4>

    <p>生前是个三十四岁无职尼特族的男子转生到异世界，开始迈向新的人生。</p>

    <p>转生后名叫鲁迪乌斯的这名男子被授予在菲托亚领地的最大都市「罗亚」担任家庭教师的工作。</p>

    <p>鲁迪乌斯原本认为自己应该有办法应付家庭教师这点小事，然而身为他学生的大小姐──艾莉丝却凶暴得远远超乎他的想像……！</p>

    <p>为了让不肯听话的艾莉丝能够服从自己，鲁迪乌斯下定决心要实行某个作战！</p>

    <p>他出生至今将挑战的最重大任务即将展开──</p>

    <p>众人憧憬的人生重来型转生奇幻小说，第二集！在热烈反应下迅速推出！</p>
  </div>
