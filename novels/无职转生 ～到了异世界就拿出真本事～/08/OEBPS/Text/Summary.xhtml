    <h4>简介</h4>

    <p>鲁迪乌斯只身开始寻找母亲塞妮丝后，过了几年。</p>

    <p>以冒险者身分闯出名号的鲁迪乌斯手边收到了来自魔法大学的推荐函！</p>

    <p>鲁迪乌斯原本以寻找母亲为优先，想要放掉这次入学的机会，却在梦中从「人神」那边收到建议，因此决心要前往魔法大学。</p>

    <p>「我的Erectile Dysfunction会在魔法大学治好吗！人神大人！」</p>

    <p>鲁迪乌斯虽然顺利合格并入学就读，同班的特别生却都是一些问题儿童……？</p>

    <p>学园篇开始！「人生重来型」转生奇幻小说第八集在此登场！</p>
