  <div>
    <h4>简介</h4>

    <p>在春天的暖阳中，年幼的少女妖精菈琪旭捧着《圣剑》瑟尼欧里斯陷入遐想──</p>

    <p>那是五百年前发生的事。正规勇者黎拉十四岁，准勇者威廉十五岁。</p>

    <p>拯救人类免于星神威胁的这对师兄妹，平日的生活既荒唐又多采多姿……</p>

    <p>那是稍早前发生的事。</p>

    <p>注定赴死的成体妖精兵珂朵莉，以及二等咒器技官威廉。</p>

    <p>受思慕的每一分每一秒，都将成为他们俩难以忘怀的梦。</p>

    <p><br /></p>

    <p>出自《末日时在做什么？》第一部的外传故事登场。</p>
