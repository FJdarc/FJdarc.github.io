  <div>
    <h4>简介</h4>

    <p>各地的通讯石板与转移魔法阵皆失去功能，鲁迪乌斯与伙伴们集结在斯佩路德族的村子。</p>

    <p>状况正如基斯所策划，毕黑利尔王国的讨伐队逼近斯佩路德族的村子。</p>

    <p>而北神卡尔曼三世、前剑神加尔•法利昂及鬼神马尔塔三人也随着讨伐队一起出现。</p>

    <p>对手的战斗力是世界最强级别，赌上鲁迪乌斯等人命运的决战就此揭幕！</p>

    <p>「……我是龙神的部下，『泥沼』鲁迪乌斯．格雷拉特。」</p>

    <p>「吾乃『北神』，亚历山大．卡尔曼．雷白克！」</p>

    <p>另一方面，没出现在决战现场的基斯身在何处……？</p>

    <p>人生重来型转生奇幻小说，激荡的第二十五集！</p>
  </div>
