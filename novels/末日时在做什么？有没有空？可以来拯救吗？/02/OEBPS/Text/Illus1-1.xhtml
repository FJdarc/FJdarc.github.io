<body>
  <div class="em09 illus2 ico1">
    <p><br /></p>

    <p>以前的人曾說，</p>

    <p>天空上有著未來。</p>

    <p>然而，</p>

    <p>實際造訪過後，</p>

    <p>結果卻只能在那裡</p>

    <p>找到「現在」。</p>

    <p><br /></p>

    <p>現在大家都說，</p>

    <p>天空底下有著過去。</p>

    <p>然而，</p>

    <p>實際下去一看，</p>

    <p>那裡卻只有整片</p>

    <p>灰茫茫的「現在」。</p>

    <p><br /></p>

    <p>既然這樣，</p>

    <p>我們的未來在哪裡？</p>

    <p>答案……</p>

    <p>肯定只在</p>

    <p>我的手掌中。</p>
  </div>
