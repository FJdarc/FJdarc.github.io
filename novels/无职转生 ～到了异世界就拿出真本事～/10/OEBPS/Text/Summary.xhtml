    <h4>简介</h4>

    <p>鲁迪乌斯达成进入魔法大学的目的，并找回了身为男人的自信。</p>

    <p>他为了向关照自己的爱丽儿等人答谢并报告此事，前往学生会室。</p>

    <p>然而此时爱丽儿却提出问题，询问今后他与希露菲有何打算……</p>

    <p>鲁迪乌斯尽管对这个提问感到不知所措，依旧明确答道：</p>

    <p>「我……要和希露菲结婚。」</p>

    <p>从寻找新家到准备婚宴，甚至还得仓促地准备结婚所必须的物品，不管做什么都尽是课题……！在前世没办法实现的新婚生活，过程却是超乎想像的一波三折？</p>

    <p>「人生重来型」转生奇幻小说，第十集在此登场！</p>
