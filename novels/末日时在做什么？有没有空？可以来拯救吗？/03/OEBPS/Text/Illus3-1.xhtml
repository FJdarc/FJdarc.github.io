<body>
  <div class="em09 illus2 ico2-2">
    <p><br /></p>

    <p><br /></p>

    <p>当时我很雀跃喔。</p>

    <p>接下来会发生什么事呢，这个世界有什么好玩的事情在等着我呢？我满心都是这样的想法。</p>

    <p><br /></p>

    <p>咦，你那是什么表情？</p>

    <p>我们在谈我刚出生时的心情，对吧？是你问了我才回答的。</p>

    <p><br /></p>

    <p>有那么不搭调吗？</p>

    <p>我的个性又不是从一出生就这么无趣。</p>

    <p>比如说蓝天，比如说还没读过的书，那样的事物会令人觉得莫名辽阔。你应该也曾有过类似的体验吧？</p>

    <p>我当时的心情肯定只是如此而已。</p>

    <p><br /></p>

    <p>那是在我成为我以前，前世的某个人将眷恋遗留于世的形式──</p>

    <p>说起来，也就如此而已。</p>
  </div>
