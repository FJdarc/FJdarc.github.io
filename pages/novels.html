---
layout: page
title: 小说
---

<style>
  #url-display {
    display: none;
  }
</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}

    <div id="url-display">TEST</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // 获取所有小说链接
  const links = document.querySelectorAll('.list-post a.hover-underline');
  const urlDisplay = document.getElementById('url-display');
  
  links.forEach(link => {
    link.addEventListener('click', function(event) {
      // 阻止链接默认跳转行为
      event.preventDefault();
      
      // 获取页面中所有.list-post元素
      const allListPosts = document.querySelectorAll('.list-post');
      
      // 遍历并隐藏所有列表项
      allListPosts.forEach(post => {
        post.style.display = 'none';
        urlDisplay.style.display = 'block';
      });
    });
  });
});
</script>
