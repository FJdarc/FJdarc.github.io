    <p><br /></p>

    <p>我曾发誓要和他永远在一起。</p>

    <p>能发誓是幸福的。</p>

    <p><br /></p>

    <p>我曾想过自己喜欢这个人。</p>

    <p>能这样想是幸福的。</p>

    <p><br /></p>

    <p>我曾听他说：「我会让你幸福。」</p>

    <p>能听他那么说是幸福的。</p>

    <p><br /></p>

    <p>那个人分了这么多的幸福给我。</p>

    <p>所以，我可以肯定……</p>

    <p><br /></p>

    <p>不管别人怎么说，现在的我，</p>

    <p>是世界上最幸福的女孩子。</p>
