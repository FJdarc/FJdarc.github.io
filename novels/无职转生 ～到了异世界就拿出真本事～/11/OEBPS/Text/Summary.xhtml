    <h4>简介</h4>

    <p>鲁迪乌斯继续待在魔法大学里就读，同时和希露菲叶特过着新婚生活。</p>

    <p>然而父亲保罗把两个妹妹托付给他，四个人的新生活就此开始。</p>

    <p>自立可靠的爱夏，和有着这年纪拗脾气的诺伦，和个性完全相反的两人一起生活可说是问题不断。</p>

    <p>在这种状况下，鲁迪乌斯想按照父亲希望，安排两人进入魔法大学就读，可是妹妹们却各自抱着不同想法……</p>

    <p>「……这就是大哥当初的心情吗？」</p>

    <p>因为妹妹们而察觉到的，对前世家人的感情又是？</p>

    <p>「人生重来型」转生奇幻小说第十一集在此开幕！</p>
