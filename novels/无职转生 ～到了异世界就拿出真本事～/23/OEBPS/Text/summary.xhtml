    <h4>简介</h4>

    <p>与拉普拉斯拥有相同绿发的第四个孩子，齐格哈尔德出生。</p>

    <p>然而，来到他出生现场的佩尔基乌斯使魔之一却告诉鲁迪乌斯等人，要将这个婴儿带到空中要塞！</p>

    <p>「万一这孩子长大成人，真的与人族挑起战争，到时……我会透过为此准备的一切做出对应。」</p>

    <p>鲁迪乌斯为了家人表达出自己的觉悟。</p>

    <p>听到这句话，佩尔基乌斯所做出的回应是──？</p>

    <p>充满大量WEB所没有提及的全新特笔剧情！</p>

    <p>人生重来型转生奇幻小说，第二十三集在此开幕！</p>
