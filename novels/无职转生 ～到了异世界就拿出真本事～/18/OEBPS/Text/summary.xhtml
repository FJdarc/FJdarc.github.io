    <h4>简介</h4>

    <p>鲁迪乌斯击退强敌，顺利达成指令，让爱丽儿成为下任阿斯拉国王。</p>

    <p>在那之后他也陆续完成了各式各样的指令，还从奴隶商人手中救出了莉妮亚，转眼间一年半就过去了。</p>

    <p>某一天，莉妮亚收到了从德路迪亚族的村落寄来的一封信。</p>

    <p>「不好了，圣兽大人下落不明！马上展开搜索！」</p>

    <p>鲁迪乌斯决定前往大森林说明事情的来龙去脉。</p>

    <p>而且他将再次造访回忆中的房间（牢房？）想不到被关在里面的竟然是……！</p>

    <p>「人生重来型」转生奇幻小说，第十八集在此开幕！</p>
