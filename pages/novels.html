---
layout: page
title: 小说
---

<style>

</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
      // 获取所有小说链接
      const links = document.querySelectorAll('.list-post a.hover-underline');
      
      links.forEach(link => {
        link.addEventListener('click', function(event) {
          // 阻止链接默认跳转行为
          event.preventDefault();
          
          // 向上查找最近的 .list-post 父元素
          const listPost = this.closest('.list-post');
          if (listPost) {
            // 隐藏该列表项
            listPost.style.display = 'none';
          }
        });
      });
    });
    </script>
