<h1 class="color1">简介</h1>
<p>潘丽宝等人消灭了〈沉滞的第十一兽〉，三十八号悬浮岛沉浸在欢欣鼓舞的热烈气氛中。然而，护翼军、贵翼帝国与欧黛所要面对的，是暗藏于台面下的最终危机。被揭示出来的「避免灭亡的程序」，就是亲手破坏悬浮大陆群——「看来『我们』都打从心底看不惯那种无私的圣人啊。」纵使无法取代那两人，自无垠深幽中苏醒的青年依然梦想着，那从结局所延伸的未来。</p>
