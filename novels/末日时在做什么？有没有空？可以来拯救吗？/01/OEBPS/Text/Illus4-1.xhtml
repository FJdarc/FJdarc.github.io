    <p>啊……</p>

    <p>我出生时的情形吗？</p>

    <p>虽然用问题来回答问题怪怪的，可是你为什么要问那种事？</p>

    <p><br /></p>

    <p>所谓的人生，是从出生起就开始的喔。</p>

    <p>而我们的人生就是属于我们的。</p>

    <p>若是出生时还无法忘怀前世宿命之类的东西，那怎么对得起我们此时此刻所过的每一天嘛。</p>

    <p><br /></p>

    <p>所以啰，如果技官能像之前一样，只看着眼前的我们几个，并投注爱情，那就再好不过啦。</p>

    <p>……呃，刚才说的那番话是要让你害羞的喔，并没叫你一脸正经地点头喔。</p>
