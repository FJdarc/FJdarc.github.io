  <div>
    <h4>简介</h4>

    <p>「人类」遭到非比寻常的「兽」蹂躏而灭亡了。除了独自从数百年沉眠中苏醒的青年威廉以外。唯有「<ruby>圣剑<rt>carillon</rt></ruby>」与使用圣剑的妖精兵能代替「人类」打倒「兽」。战门过后，「圣剑」能再次被他人使用，但用尽力量的妖精兵们却会殒命。</p>

    <p>「至少，我也希望自己不用消失，也想让别人记住。我也想留下羁绊啊。」</p>

    <p>这是注定赴死的妖精少女们和青年教官共度的，既短暂又灿烂的日子。</p>
