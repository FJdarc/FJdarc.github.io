<h4>简介</h4>
<p>「人类」遭到非比寻常的「兽」蹂躏而灭亡了。唯有挥舞「圣剑」的黄金妖精能打倒「兽」。战斗过后，「圣剑」可以由他人继承使用，但用尽力量的妖精兵们却会殒命。</p>
<p>
「你说谁被恋爱搞得脑子打结还最喜欢自我牺牲啊！」「你们啦！就是你们！难道你没自觉吗！要有自觉！」</p>
<p>
憧憬学姊而一心求死的黄金妖精，与说谎成性的堕鬼族青年尉官在废弃剧场相遇后，成立于内心纠葛之上的短暂日常生活。由下一代黄金妖精们带来的新章故事，就此揭幕！</p>
