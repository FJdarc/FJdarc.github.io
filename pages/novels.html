---
layout: page
title: 小说
---

<style>
  #novel-display {
    display: none;
    white-space: pre-line;
  }
</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}

    <div id="novel-display"></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const links = document.querySelectorAll('.list-post a.hover-underline');
    const novelDisplay = document.getElementById('novel-display');
  
    links.forEach(link => {
      link.addEventListener('click', async (event) => {
        event.preventDefault();

        novelDisplay.style.display = 'block';
        novelDisplay.textContent = '正在加载...';
  
        const allListPosts = document.querySelectorAll('.list-post');
        allListPosts.forEach(post => post.style.display = 'none');
        
        try {
          const response = await fetch(this.href);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          
          const text = await response.text();
          novelDisplay.textContent = text;
          history.pushState({ showContent: true }, '', this.href);
        } catch (error) {
          console.error('加载失败:', error);
          novelDisplay.textContent = '小说加载失败，请稍后再试';
        }
      });
    });
  });
</script>
