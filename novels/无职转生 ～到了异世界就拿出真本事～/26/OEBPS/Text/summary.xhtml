    <h4>简介</h4>

    <p class="tilh center illus1 em12" style="margin: 0 0 1em 0;"><i>漫长的</i><i class="sco1">决战</i><i>，</i><i class="sco1">画下最后的句点！</i></p>

    <p>与基斯一同出现的是人神最后的使徒，巴迪冈迪。</p>

    <p>他拥有能够无限再生身体的不死魔族特性，</p>

    <p>还装备了拉普拉斯制作的传说铠甲「斗神铠」。</p>

    <p>鲁迪乌斯一行人将与这最强的敌人对峙。</p>

    <p>「……我明白了。我就接受这场决斗吧。</p>

    <p>由在场的所有人来当你的对手。」</p>

    <p>避无可避、豁尽全力的这场总力战，结果会是？</p>

    <p>然后，与人神这场漫长战斗的结局又是……？</p>

    <p>鲁迪乌斯的故事在此完结！</p>

    <p>人生重来型转生奇幻小说，万众瞩目的第二十六集！</p>
