<h1 class="fm">簡介</h1>
<p class="font09">妖精兵珂朵莉·诺塔·瑟尼欧里斯消灭了，威廉·克梅修二等技官则与妖精兵奈芙莲一同遭到黑暗吞没。故事理应就此完结——然而……</p>
<p class="font09">威廉在熟悉的房间醒来。</p>
<p class="font09">「……爸爸？」向他搭话的，是理应身亡的女儿爱尔梅莉亚。</p>
<p class="font09">此外，昔日伙伴纳维尔特里传达了有关真界再想圣歌队的真相。</p>
<p class="font09">那是应已流逝于时光彼端的末日光景——</p>
<p class="font09">暗夜之中，新诞生的〈兽〉发出咆吼。</p>
