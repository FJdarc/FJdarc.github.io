    <h4>简介</h4>

    <p>塞妮丝遭到某人绑架，下落不明。</p>

    <p>为了找到她，鲁迪乌斯在米里希昂四处奔走。</p>

    <p>「我是塞妮丝的儿子。父亲对我说过：</p>

    <p>『就算是死也要保护母亲。』所以我有义务。</p>

    <p>会负起责任照顾她到终老为止，绝对不会弃她不顾。</p>

    <p>所以，请把母亲还给我……」</p>

    <p>至今每当出现状况，总是会被先发制人的鲁迪乌斯。</p>

    <p>究竟是否能顺利将塞妮丝带回来呢……？</p>

    <p>追加特别撰写新剧情的「人生重来型」转生奇幻小说，第二十一集在此开幕！</p>
