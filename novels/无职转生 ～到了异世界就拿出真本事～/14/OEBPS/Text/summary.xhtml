  <div>
    <h4>简介</h4>

    <p>鲁迪乌斯化解了与莎拉之间长久以来的疙瘩。</p>

    <p>后来，众人决定造访甲龙王佩尔基乌斯所居住的空中要塞。</p>

    <p>他们在城内学习新的知识，感受珍奇的体验，度过了充满宝贵时光的每一天。</p>

    <p>然而另一方面，原本以为只是罹患感冒的七星，病况却突然急转直下。</p>

    <p>「请问，有办法把我送往魔大陆吗？」</p>

    <p>为了寻找治疗七星的方法，鲁迪乌斯等人展开行动。</p>

    <p>然而转移后抵达的地点，却是在「Dead End」时代留下苦涩回忆的那个场所……！</p>

    <p>重启魔大陆旅程？「人生重来型」转生奇幻小说，第十四集在此开幕！</p>
  </div>
