<h1 class="color1">简介</h1>
<p>从那时起过了十天。由于妖精的存在与特性仍属机密事项，因此击败〈沉滞的第十一兽〉一事，被归功于费奥多尔四等武官秘藏的最新试作炸弹。</p>
<p>黄金妖精菈琪旭在催发出非比寻常的强大魔力后，至今仍昏迷不醒，而苹果则已经不在了——费奥多尔下了结论。</p>
<p>与世界为敌，最初且最后之战，肯定早该开始了吧。</p>
<p>剧情急转直下！新系列第三集登场！</p>
