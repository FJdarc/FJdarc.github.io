<body>
  <div class="em09 illus2 ico1-2">
    <p><br /></p>

    <p><br /></p>

    <p>我出生时的状况啊……</p>

    <p>这不太好说。呃，我不是在卖关子，我只是不记得啦。</p>

    <p>出生以后，我似乎有好几个月都在沉睡。</p>

    <p><br /></p>

    <p>所以喽，让我想想。我最久以前的记忆是──是那个。</p>

    <p>菈恩探头看着我，还十分开心地露出笑容。</p>

    <p>「她醒了！她醒来了耶！」</p>

    <p>菈恩这么说。</p>

    <p>她当时有够开心的。</p>

    <p>我看见菈恩的反应，感觉心情也变得很愉快。我放声笑了出来，笑得停不下来。</p>

    <p>哎，对啦。这大概就是我最久以前的记忆。</p>

    <p>……你那一脸贼笑的表情是怎样，我讲了什么好笑的话吗？</p>
  </div>
