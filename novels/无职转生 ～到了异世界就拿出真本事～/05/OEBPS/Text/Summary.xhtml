    <h4>简介</h4>

    <p>与至亲的意外重逢……与争吵？</p>

    <p>解决兽族的绑架事件后，鲁迪乌斯和暴力大小姐艾莉丝，身经百战的勇士瑞杰路德，以及新加入的基斯一起到达米里斯神圣国的首都米里希昂。</p>

    <p>原本想在首都城邑稍作休息，但鲁迪乌斯却又再度目击绑架事件！</p>

    <p>基于「Dead End」的规范，为了救出被绑架的少年，鲁迪乌斯潜入绑匪的藏身处。结果却因为意外状况而被迫出手战斗。</p>

    <p>和敌方团长交战的过程中，那人物嘴里却叫出了「鲁迪」这个让人怀念的自身小名……！</p>

    <p>众人憧憬的「人生重来型」转生奇幻小说，剧情紧凑让人屏息的第五集在此登场！</p>
  </div>
