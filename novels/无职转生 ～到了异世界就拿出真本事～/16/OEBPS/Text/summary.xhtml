  <div>
    <h4>简介</h4>

    <p>鲁迪乌斯成为龙神奥尔斯帝德的部下，并迎娶艾莉丝为妻。</p>

    <p>后来他召唤出保护家人的守护魔兽，暂时找回了平静的每一天。</p>

    <p>然而就在某天，奥尔斯帝德下达了第一个任务，要他「让阿斯拉王国第二公主的爱丽儿登上王位」。</p>

    <p>「虽然我听说这里没有危险，但好歹也是被称为迷宫的场所。请各位小心前进。」</p>

    <p>为了找到说服甲龙王佩尔基乌斯成为后盾的线索，鲁迪乌斯等人前往图书迷宫。</p>

    <p>于是，在他们寻找初代国王的资料时，发现了某本日记！</p>

    <p>而那本日记的作者还有内容会是……？</p>

    <p>追加了特笔新剧情的「人生重来型」转生奇幻小说，第十六集在此登场！</p>
