<h1 class="color1">简介</h1>
<p>「费奥多尔，我终于下定决心了——我要阻挠你。」</p>
<p>妖精兵缇亚忒与堕鬼之间的对峙，由菈琪旭挥动《圣剑》瑟尼欧里斯所给予的一击划下了句点。</p>
<p>负伤的堕鬼族欲前往的目的地是——昔日的战场科里拿第尔契市。</p>
<p>在巴洛尼·马基希一等宪兵武官的安排下，缇亚忒前往当地，并遇到了朱红色头发的妖精兵学姊等人。</p>
<p>另一方面，妖精仓库的管理者食人鬼也在同一时刻来到当地拜访旧识……</p>
