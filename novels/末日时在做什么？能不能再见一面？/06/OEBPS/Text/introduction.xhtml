<h1 class="color1">简介</h1>
<p>费奥多尔朝在镜子那端浮现笑意的黑发青年开口。</p>
<p>能不能把你的力量借给我呢？——我要让悬浮大陆群坠落。</p>
<p>将连锁绝望、连结希望的遗迹兵器莫乌尔涅握在手中，刻划于战场上的，是最后的谎言。</p>
<p><br/></p>
<p>「堕鬼族是恶人，绝不可相信。」</p>
<p>虽然他没有资格待在玛格、缇亚忒还有菈琪旭等人身边，但这就是让「大家」获得幸福的唯一方法。</p>
<p><br/></p>
<p>科里拿第尔契市的长夜即将迎来曙光——</p>
