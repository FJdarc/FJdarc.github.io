    <div class="em08 ico2">
      <p class="zin lh illus2" style="margin: 0;">我們只認得這片天空、這座城鎮。</p>

      <p class="zin lh illus2" style="margin: 0;">既沒有辦法和其他東西做比較，也不會去比。</p>

      <p class="zin lh illus2" style="margin: 0;"><br /></p>

      <p class="zin lh illus2" style="margin: 0;">即使如此，不，正因為如此，才能挺起胸膛這麼說──</p>
