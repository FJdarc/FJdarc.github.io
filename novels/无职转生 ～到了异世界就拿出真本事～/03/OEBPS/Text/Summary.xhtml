    <h4>简介</h4>

    <p>原本是个无职尼特族的男子──鲁迪乌斯由于被卷入原因不明的魔力灾害，因此和家人失散。</p>

    <p>经过灾害后，他被转移到一个陌生的地方。和鲁迪乌斯在一起的人是大小姐艾莉丝，同时也是他负责担任家庭教师的对象。内心愈来愈不安的鲁迪乌斯身边出现奇怪的人影……？</p>

    <p>翠绿色的头发，白磁般的雪白皮肤，还有额头上看起来像是红宝石的感觉器官。</p>

    <p>那是鲁迪乌斯的师父洛琪希曾经教导他「绝对不可以接近」的存在──斯佩路德族！</p>

    <p>要找回过去的幸福！大受欢迎的「人生重来型」奇幻小说第三集在此登场！</p>
  </div>
