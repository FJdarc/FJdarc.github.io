    <h4>简介</h4>

    <p>和保罗的激烈父子争执终于顺利和解后，「Dead End」一行人继续朝着阿斯拉王国前进。</p>

    <p>才刚决定好要以哪条路线前往阿斯拉王国，人神却告知侍女莉莉雅与异母妹妹爱夏被西隆王国扣留的情报！</p>

    <p>为了确定真伪而前往西隆王国后，鲁迪乌斯目睹到一名长相和莉莉雅相似的少女正在大声哭喊的光景……！</p>

    <p>众人憧憬的「人生重来型」转生奇幻小说，剧情急转直下的第六集在此开始！</p>
