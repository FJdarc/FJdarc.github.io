---
layout: page
title: 小说
---

<style>

</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}

    <div id="url-display"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
      // 创建信息显示容器
      const infoBox = document.createElement('div');
      infoBox.id = 'url-display';
      document.body.prepend(infoBox);
    
      document.querySelectorAll('.list-post a').forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const clickedUrl = this.href;
    
          // 第一步：隐藏所有列表项
          document.querySelectorAll('.list-post').forEach(post => {
            post.classList.add('hidden');
          });
    
          // 第二步：延迟执行显示操作
          setTimeout(() => {
            // 更新信息框内容
            infoBox.textContent = `正在加载：${new URL(clickedUrl).pathname.split('/').pop()}`;
            infoBox.classList.add('show');
    
            // 第三步：跳转或执行其他操作
            setTimeout(() => {
              window.location.href = clickedUrl;
            }, 1000);
          }, 500); // 等待列表隐藏动画完成
        });
      });
    });
    </script>
