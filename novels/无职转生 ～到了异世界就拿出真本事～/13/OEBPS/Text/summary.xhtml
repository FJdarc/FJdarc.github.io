    <h4>简介</h4>

    <p>迎接第二名妻子和女儿后，鲁迪乌斯展开新生活。</p>

    <p>希露菲和洛琪希这两名妻子彼此的感情很和睦，对双方都很重视的鲁迪乌斯过着幸福的日子。</p>

    <p>他们会三人一起去购物、学习魔术，还参加了友人的婚礼，每一天的现实生活都非常充实。</p>

    <p>在这种状况下，鲁迪乌斯和两名妻子一起承接工作。</p>

    <p>结果同行者中，却出现过去和他难堪分手的少女，莎拉。</p>

    <p>「居然要和前女友一块工作……」</p>

    <p>幸福的结婚生活终于要面临惊涛骇浪吗？</p>

    <p>「人生重来型」转生奇幻小说第十三集在此开幕！</p>
