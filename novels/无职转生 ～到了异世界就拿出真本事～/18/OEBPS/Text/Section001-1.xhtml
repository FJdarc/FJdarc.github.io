  <div>
    <p><br /></p>

    <p>啪的一声，我阖上了日记。</p>

    <p>不打算寄给任何人，类似书信那样的日记。不过，像这样把事情写上去后，有时会在自己的内心萌发新的觉悟，而这份觉悟会转变为强烈的动机，牵动着我的身体。</p>

    <p>「好，走吧。」</p>

    <p>我今天也充满干劲地站起身子。目的地是魔法阵。</p>

    <p>今天也要开始干活了。</p>
