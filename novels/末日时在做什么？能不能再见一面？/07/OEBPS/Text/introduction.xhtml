<h1 class="color1">简介</h1>
<p>在一名少年策划的舞台上，一名少女成了英雄。</p>
<p>能够对抗〈兽〉的黄金妖精的存在广为流传，悬浮大陆群因为小小的守护者而激昂沸腾；</p>
<p>另一方面，侵蚀的脚步声逐渐逼近三十八号悬浮岛。</p>
<p>「我去善尽黄金妖精的责任，虽然有点对不起学姊们就是了。」</p>
<p>潘丽宝·诺可·卡黛娜为了使尽全力，挺身与〈兽〉一战，而踏上被〈第十一兽〉吞噬的三十九号悬浮岛。</p>
<p>这是由被塑造出来的英雄所谱出的，临近尾声的故事。</p>
