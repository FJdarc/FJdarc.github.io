  <div>
    <h4>简介</h4>

    <p>鲁迪乌斯进了魔法大学，过着在前世未能体验的充实校园生活。</p>

    <p>某一天，他在街上遇见了同样在调查转移事件的菲兹。</p>

    <p>然而菲兹的态度却与平常不同显得相当疏远，鲁迪乌斯对此感到怀疑，开始独自展开调查。</p>

    <p>结果导致他得知了菲兹被学生会隐藏起来的秘密。</p>

    <p>「不过菲兹学长是想隐瞒吗？」</p>

    <p>认为事有蹊跷的鲁迪乌斯本想把这件事藏在心里，然而菲兹本人却把他带至森林？</p>

    <p>「人生重来型」转生奇幻小说，校园故事完结篇的第九集在此登场！</p>
  </div>
