<body>
  <div class="em09 illus2 ico1">
    <p><br /></p>

    <p>爸爸他们一直以来的心愿</p>

    <p>似乎是返回故乡。</p>

    <p>众多的〈兽〉似乎一直</p>

    <p>苦苦哀求着要取回故乡。</p>

    <p><b>红湖</b>是这么告诉我的。</p>

    <p><br /></p>

    <p><br /></p>

    <p>我对叫「故乡」的地方不太了解。</p>

    <p>将听到的内容整理过后，</p>

    <p>我了解到那里好像是</p>

    <p>有人会照顾自己，</p>

    <p>只要回去就有人会迎接，</p>

    <p>还会说「你回来了」的地方。</p>

    <p>而那好像是非常开心，</p>

    <p>非常温暖的事情……</p>

    <p><br /></p>

    <p>我不晓得故乡在什么地方。</p>

    <p>可是，只要待在这里，</p>

    <p>我觉得自己或许迟早会晓得。</p>

    <p><b>黎拉</b>想保护的地方。</p>

    <p><b>珂朵莉</b>想回去的地方。</p>

    <p>目前，我独占了她们心中的那块地方，</p>

    <p>并寻找着自己将来该回去的归宿。</p>
  </div>
