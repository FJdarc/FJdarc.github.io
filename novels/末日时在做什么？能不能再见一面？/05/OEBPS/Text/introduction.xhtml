<h1 class="color1">简介</h1>
<p>为了查明遗迹兵器莫乌尔涅的真相，前四等武官费奥多尔悄悄潜入护翼军司令总部。</p>
<p>阻挡在他前面的，是过去的妖精兵娜芙德·卡罗·奥拉席翁。</p>
<p>菈琪旭看到昏迷不醒的堕鬼族，明白只要自己还存在于世，他就永远无法获得救赎。</p>
<p>「你应该很清楚吧？你单是待在那孩子身边，他就会愈来愈接近死亡。」</p>
<p>妖精兵告别后，占满她思绪的，是大量的片段词句——关于「那一夜」的记忆。</p>
