---
layout: page
title: 小说
---

<style>
  #novel-display {
    display: none;
    white-space: pre-line;
  }
</style>

<div class="page page-index">
    {% for novel in site.novels  -%}
      <div class="list-post">
        <ul>
          <li>
            <span class="date">{{ novel.author }}</span>
            <div class="title">
              <a href="{{ site.domainUrl }}{{ site.baseurl }}/static{{ novel.url }}" class="hover-underline">{{ novel.name }}</a>
            </div>
          </li>
        </ul>
      </div>
    {%- endfor %}

    <div id="novel-display">正在加载...</div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const links = document.querySelectorAll('.list-post a.hover-underline');
    const novelDisplay = document.getElementById('novel-display');
  
    links.forEach(link => {
      link.addEventListener('click', async (event) => {
        event.preventDefault();

        novelDisplay.style.display = 'block';
  
        const allListPosts = document.querySelectorAll('.list-post');
        allListPosts.forEach(post => post.style.display = 'none');

        const url = link.getAttribute('href');

        const response = await fetch(url);
        if (!response.ok) {
          novelDisplay.textContent = '加载失败，请稍后再试。';
          return;
        }
        novelDisplay = await response.text();
      });
    });
  });
</script>
