  <div>
    <h4>简介</h4>

    <p>和父亲保罗再会之后，鲁迪乌斯为了救出母亲而闯入「转移迷宫」。</p>

    <p>一行人参考从夏利亚带来的书籍，逐步深入迷宫内部。</p>

    <p>他们在途中救出洛琪希，然后避开各式陷阱，击倒棘手魔物，成功到达了最底层。</p>

    <p>一切都进行得很顺利，他也以为很快就能救出母亲。</p>

    <p>然而，在迷宫最深处等待鲁迪乌斯的却是足以打碎这份希望的冲击性事件！</p>

    <p>「我还以为转生到这个世界后，自己已经改变……」</p>

    <p>鲁迪乌斯因为后悔而非常痛苦，拯救他脱离绝望深渊的人物到底是谁？</p>

    <p>「人生重来型」转生奇幻小说第十二集在此开幕！</p>
