  <div>
    <h4>简介</h4>

    <p>威廉没能遵守约定，〈叹月的最初之兽〉的结界瓦解。</p>

    <p>昔日正规勇者付出性命作为交换，令年幼星神陷入长眠。</p>

    <p>受其余波影响，星神与空鱼红湖伯失散，</p>

    <p>并与被封住记忆的威廉一同过着虚假的平静生活。</p>

    <p>直到那一天，〈穿凿的第二兽〉降临于悬浮大陆为止──</p>

    <p>艾瑟雅和菈恩托露可与〈兽〉对峙。</p>

    <p>注定赴死的妖精少女们与青年教官在末日绽放的最后光辉。</p>

    <p>交由新世代继承的第一部，就此落幕。</p>
  </div>
