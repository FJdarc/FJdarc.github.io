    <h4>简介</h4>

    <p>终于发现了至今一直隐藏身分的人神使徒！</p>

    <p>为了与其对抗，打算聚集战力的鲁迪乌斯决定说服支配魔大陆的不死魔王阿托菲。</p>

    <p>鲁迪乌斯带着强力的伙伴造访魔大陆。</p>

    <p>但是对方个性古怪，导致交涉陷入胶着……？</p>

    <p>「阿托菲大人，在战斗之前，是否能先听我说句话？」</p>

    <p>挡在前方的是无法沟通的魔王。</p>

    <p>面对旁若无人的她，鲁迪乌斯一行人会……</p>

    <p>「人生重来型」转生奇幻小说，第二十二集在此开幕！</p>
