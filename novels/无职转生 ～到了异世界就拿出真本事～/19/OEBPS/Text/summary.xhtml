  <div>
    <h4>简介</h4>

    <p>西隆王国向札诺巴寄了一封信，内容大意是要求他回国。</p>

    <p>由于王国发生政变，为了补充下滑的兵力，此刻需要有国防力量稳固国家局势。</p>

    <p>「札诺巴帮助过我。在日记里也是，他直到最后都在帮我。」</p>

    <p>鲁迪乌斯领悟到信件的内容是人神设下的陷阱。</p>

    <p>认为不能眼睁睁让札诺巴回国的他，决定带着洛琪希，与札诺巴一同前往西隆王国。</p>

    <p>然而，在那里等着他们的，却是七大列强排行第五位的死神──蓝道夫•马利安。</p>

    <p>在无法判别敌我的状况下，鲁迪乌斯是否能成功粉碎人神的企图呢！</p>

    <p>「人生重来型」转生奇幻小说，第十九集在此开幕！</p>
  </div>
