  <div style="margin: 3%;">
    <p><br /></p>

    <div class="em09 ico2 bold illus2 ico7">
      <p>「話說回來，你都沒變啊。」</p>

      <p>「哎，畢竟我之前變成了石像。</p>

      <p>話雖如此，被澈底改變的你這麼講，倒是很令人感慨。」</p>

      <p>「我指的不是外表，而是你不忍心放著小女孩不管的個性。</p>

      <p>居然連跨越時代，甚至跨越種族以後還是沒變，真是服了你。」</p>

      <p>「別用那種容易造成誤解的說法。你以前也半斤八兩吧。</p>

      <p>你有一次不是替我好好地照顧了那些小不點嗎？」</p>

      <p>「因為那是在愛爾梅莉亞面前。</p>

      <p>在憧憬地女性面前耍帥是人之常情吧。</p>

      <p>要不然，誰想跟那種聒噪地生物扯上關係啊。」</p>

      <p>「搞什麼，原來你是那樣看待愛爾的嗎？」</p>

      <p>「──慢著。別發出殺氣。那都是往事了。我叫你慢著。」</p>
    </div>

    <p class="zin lh illus1 ibox2"><b>威廉</b></p>
