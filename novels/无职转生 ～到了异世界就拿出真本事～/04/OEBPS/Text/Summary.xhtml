  <div>
    <h4>简介</h4>

    <p>由于突然发生的魔力灾害，鲁迪乌斯和暴力大小姐艾莉丝一起被转移到魔大陆上。</p>

    <p>两人在身经百战的战士──瑞杰路德的帮助下，朝着故乡菲托亚领地前进。</p>

    <p>为了回到中央大陆，一行人费尽千辛万苦才到达港口城镇「温恩港」。</p>

    <p>在那里帮助的少女，没想到就是那个传说中的魔界大帝奇希莉卡！</p>

    <p>她声称是谢礼而赐予鲁迪乌斯的新力量「魔眼」到底是……？</p>

    <p>众人憧憬的「人生重来型」异世界奇幻小说，期待的第四集在此登场！</p>
  </div>
