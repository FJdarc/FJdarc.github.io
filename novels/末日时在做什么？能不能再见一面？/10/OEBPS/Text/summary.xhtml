    <h4>简介</h4>

    <p>拯救<ruby>悬浮大陆群<rt>Regulu Ere</rt></ruby>的最终战役开始了。在〈<ruby>最后之兽<rt>结界</rt></ruby>〉内部展开的，是仿造过去的地表打造的世界。妖精们各自降落岛上，缇亚忒清醒后，遇见了一名自称爱玛的女性，和一名披着白披风的少年──有的妖精兵从<ruby>豚头族<rt>Ork</rt></ruby>手中救出许多人类，有的妖精兵打倒了<ruby>龙族<rt>Dragon</rt></ruby>。此时出现了一个新选项，让原本打算破坏这个世界的妖精兵们分崩离析。「那个时刻就快到了。让你选择自己要走哪条路的时刻。」乐园即将迈向崩坏。</p>
