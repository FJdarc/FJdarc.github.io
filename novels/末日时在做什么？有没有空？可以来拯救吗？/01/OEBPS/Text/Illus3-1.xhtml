  <div class="em09 illus2 ico2">
    <p><br /></p>

    <p><br /></p>

    <p>那就是我最早以前的记忆。</p>

    <p>那天风有点强，云也不多。天空看起来像会把人吸进去，嗯，就是那种感觉。</p>

    <p>如果就那样站着不动，感觉似乎会融入风中消失呢。那也无妨。我就那样想着这些事，一直呆站着。</p>

    <p><br /></p>

    <p>……这个世界濒临毁灭了。</p>

    <p>重要的东西全在许久之前就已经被摧毁。留下来的事物全都没有价值。</p>

    <p>虽然我不晓得理由，可是刚出生时的我，思考的尽是那种事情。</p>

    <p><br /></p>

    <p>我想，那样的情绪……</p>

    <p>肯定和你现在心里所想的一样。</p>
  </div>
