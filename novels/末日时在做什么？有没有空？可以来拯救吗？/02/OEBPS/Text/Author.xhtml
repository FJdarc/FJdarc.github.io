    <p class="aline"><br /></p>

    <p class="zin em09">以每隔幾年一次的步調，像是想起來一般突然地寫起小說或遊戲劇本的奇妙生物。多虧如此，永遠都能保有新人的青澀感來工作。這樣好嗎？</p>

    <p><br /></p>

    <p class="zin lh title em12" style="margin: 0;">●ue</p>

    <p class="aline"><br /></p>

    <p class="zin em09">我想讓妮戈蘭小姐來照顧我。</p>
