    <h4>简介</h4>

    <p>迪乌斯与札诺巴一同从西隆王国回到了拉诺亚王国，每天都为了打倒人神而进行布局。</p>

    <p>就在那样的某天，从魔法大学毕业的克里夫收到了米里斯神圣国的祖父寄来的一封信。</p>

    <p>与札诺巴那时相同，鲁迪乌斯怀疑这是人神的陷阱，却没想到他手上也收到了信……！</p>

    <p>寄信的是塞妮丝的老家拉托雷亚家，内容是要求他返家一趟！</p>

    <p>「初次见面，外祖母，我叫鲁迪乌斯．格雷拉特。今天──」</p>

    <p>在各式各样的想法交错之下，来到米里希昂的鲁迪乌斯等人，等待着他们的会是？</p>

    <p>「人生重来型」转生奇幻小说，第二十集在此开幕！</p>
