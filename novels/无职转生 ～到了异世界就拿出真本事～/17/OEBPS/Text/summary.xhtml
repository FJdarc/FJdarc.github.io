  <div>
    <h4>简介</h4>

    <p>从图书迷宫归来之后过了几周。</p>

    <p>鲁迪乌斯为了完成让爱丽儿登上王位的指令，与爱丽儿同行前往阿斯拉王国。</p>

    <p>为了迎接决战，一行人在王都亚尔斯的王城备妥了舞台。</p>

    <p>他们克服了重重障碍，来到了宴会当天。</p>

    <p>爱丽儿顺利地把敌方势力的第一王子逼入绝境。</p>

    <p>然而，对手也隐藏了撒手锏，害得一行人陷入绝境……！</p>

    <p>「不妙。怎么办？该怎么办才好？我没办法动。」</p>

    <p>鲁迪乌斯能够顺利让爱丽儿登上王位吗？</p>

    <p>「人生重来型」转生奇幻小说，第十七集在此登场！</p>
