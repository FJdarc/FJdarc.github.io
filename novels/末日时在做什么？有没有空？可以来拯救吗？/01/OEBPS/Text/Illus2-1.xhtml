  <div class="em09 illus2 ico1-2">
    <p><br /></p>

    <p><br /></p>

    <p>我出生时的情形？</p>

    <p>嗯，稍微有点印象。</p>

    <p><br /></p>

    <p>我在昏暗的森林里独自哇哇大哭。</p>

    <p><br /></p>

    <p>虽然寂寞也是我哭的原因，但不知道为什么，内心很悲伤。</p>

    <p>如果就这样一直没被前辈们发现，我想，我大概会哭成一滩水洼吧……不，我们的体质还满匪夷所思，这番话有一半是认真的。</p>

    <p><br /></p>

    <p>现在？现在已经没问题了。生活又没有平稳到可以让我因为寂寞难过而哭哭啼啼的。</p>

    <p>……欸，做什么。你那是什么温柔的眼神？</p>

    <p>感觉好像被你当成小孩，真令人火大。</p>
  </div>
